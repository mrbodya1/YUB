<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Королевская битва — Рейтинг</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f2f2f7;
      color: #1c1c1e;
    }

    .app {
      max-width: 600px;
      margin: 0 auto;
      padding-bottom: 20px;
    }

    header {
      background: linear-gradient(135deg, #5E5CE0 0%, #3A3A9E 100%);
      color: white;
      padding: 32px 20px;
      text-align: center;
    }

    header h1 {
      font-size: 28px;
      margin-bottom: 6px;
    }

    header p {
      font-size: 14px;
      opacity: 0.85;
    }

    .search-box {
      margin: 16px;
    }

    .search-box input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #e5e5ea;
      border-radius: 12px;
      font-size: 16px;
      background: white;
    }

    .tabs {
      display: flex;
      background: white;
      margin: 16px;
      border-radius: 12px;
      padding: 4px;
      gap: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .tabs button {
      flex: 1;
      padding: 12px;
      border: none;
      background: transparent;
      font-size: 16px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      color: #8e8e93;
    }

    .tabs button.active {
      background: #5E5CE0;
      color: white;
      box-shadow: 0 2px 4px rgba(94,92,224,0.3);
    }

    .filters {
      display: flex;
      gap: 12px;
      margin: 16px;
    }

    .filters select {
      flex: 1;
      padding: 12px;
      border: 1px solid #e5e5ea;
      border-radius: 12px;
      background: white;
      font-size: 14px;
      cursor: pointer;
    }

    .sort-row {
      display: flex;
      gap: 8px;
      margin: 0 16px 16px;
      flex-wrap: wrap;
    }

    .sort-row button {
      flex: 1;
      padding: 10px;
      border: 1px solid #e5e5ea;
      background: white;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
    }

    .sort-row button.active {
      background: #5E5CE0;
      color: white;
      border-color: #5E5CE0;
    }

    .list {
      margin: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .rank {
      font-size: 22px;
      font-weight: 700;
      width: 44px;
      text-align: center;
      color: #5E5CE0;
    }

    .info {
      flex: 1;
    }

    .name {
      font-weight: 600;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 12px;
      color: #8e8e93;
    }

    .km {
      font-weight: 700;
      font-size: 18px;
      color: #5E5CE0;
    }

    .nom-section {
      margin: 16px;
    }

    .nom-title {
      font-weight: 700;
      margin: 16px 0 8px;
      font-size: 16px;
      color: #1c1c1e;
    }

    .nom-card {
      background: white;
      border-radius: 16px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    .nom-icon {
      font-size: 32px;
      width: 48px;
      text-align: center;
    }

    .nom-info {
      flex: 1;
    }

    .nom-name {
      font-weight: 600;
      font-size: 14px;
    }

    .nom-desc {
      font-size: 11px;
      color: #8e8e93;
    }

    .nom-value {
      text-align: right;
    }

    .nom-value div:first-child {
      font-weight: 700;
      color: #5E5CE0;
      font-size: 14px;
    }

    .empty {
      text-align: center;
      padding: 48px;
      color: #8e8e93;
    }

    .loading, .error {
      text-align: center;
      padding: 60px;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid #e5e5ea;
      border-top-color: #5E5CE0;
      border-radius: 50%;
      margin: 0 auto 16px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error button {
      margin-top: 16px;
      padding: 10px 24px;
      background: #5E5CE0;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }

    @media (max-width: 480px) {
      .stats span {
        font-size: 11px;
      }
      .name {
        font-size: 14px;
      }
      .km {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Supabase подключение
    const SUPABASE_URL = 'https://ohaspovkdvtihosvzpli.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9oYXNwb3ZrZHZ0aWhvc3Z6cGxpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NjI1ODEsImV4cCI6MjA5MDEzODU4MX0.5OvphjjVlBP8hXvLMIALsD6pZn5453mkSEpCeOl8280';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Состояния
    let activeTab = 'rating';
    let participants = [];
    let filteredParticipants = [];
    let nominations = [];
    let sortBy = 'total_km';
    let sortOrder = 'desc';
    let filterGender = 'all';
    let searchQuery = '';

    // DOM элементы
    const root = document.getElementById('root');

    // Функции форматирования
    const formatKm = (km) => `${km?.toFixed(1) || 0} км`;
    const formatOriginalKm = (km) => `${km?.toFixed(1) || 0} км`;
    const formatTime = (min) => {
      if (!min || min === 0) return '0 мин';
      if (min < 60) return `${min} мин`;
      return `${Math.floor(min / 60)} ч ${min % 60} мин`;
    };
    const formatPace = (totalKm, totalMin) => {
      if (!totalKm || totalKm === 0) return '—';
      const pace = totalMin / totalKm;
      return `${Math.floor(pace)}:${Math.round((pace % 1) * 60).toString().padStart(2, '0')}`;
    };
    const getMedal = (idx) => {
      if (idx === 0) return '🥇';
      if (idx === 1) return '🥈';
      if (idx === 2) return '🥉';
      return `${idx + 1}`;
    };

    // Загрузка данных
    const loadData = async () => {
      renderLoading();
      try {
        // 1. Загружаем участников
        const { data: participantsData, error: participantsError } = await supabaseClient
          .from('participants')
          .select('*')
          .eq('status', 'active');
        
        if (participantsError) throw participantsError;
        
        // 2. Загружаем тренировки для каждого участника (для original_km и атак)
        const participantsWithDetails = await Promise.all(participantsData.map(async (p) => {
          // Загружаем тренировки участника
          const { data: workouts, error: workoutsError } = await supabaseClient
            .from('workouts')
            .select('original_km, mod_pos, mod_neg')
            .eq('participant_id', p.id);
          
          if (workoutsError) {
            console.error('Ошибка загрузки тренировок для', p.id, workoutsError);
          }
          
          // Сумма original_km (исходный километраж без учёта способностей)
          const totalOriginalKm = workouts?.reduce((sum, w) => sum + (w.original_km || 0), 0) || 0;
          
          // Количество атак (способности, применённые на других)
          const { data: abilities, error: abilitiesError } = await supabaseClient
            .from('abilities_usage')
            .select('id')
            .eq('initiator_id', p.id);
          
          if (abilitiesError) {
            console.error('Ошибка загрузки атак для', p.id, abilitiesError);
          }
          const attacksCount = abilities?.length || 0;
          
          // Средний темп
          let avg_pace = 0;
          if (p.total_km > 0 && p.total_min > 0) {
            avg_pace = p.total_min / p.total_km;
          }
          
          return { 
            ...p, 
            avg_pace: parseFloat(avg_pace.toFixed(2)),
            total_original_km: totalOriginalKm,
            attacks: attacksCount
          };
        }));
        
        participants = participantsWithDetails;
        
        calculateNominations();
        applyFiltersAndSort();
        render();
      } catch (err) {
        console.error('Ошибка:', err);
        renderError(err.message);
      }
    };

    // Расчёт номинаций (топ-3 в каждой)
    const calculateNominations = () => {
      const byKm = [...participants].sort((a, b) => b.total_km - a.total_km);
      const byPace = [...participants].filter(p => p.avg_pace > 0).sort((a, b) => a.avg_pace - b.avg_pace);
      const byWorkouts = [...participants].sort((a, b) => b.total_workouts - a.total_workouts);
      const byAttacks = [...participants].sort((a, b) => b.attacks - a.attacks);
      const bySnowflakes = [...participants].sort((a, b) => b.snowflake_balance - a.snowflake_balance);
      
      const formatPaceDisplay = (pace) => {
        if (!pace || pace === Infinity) return '—';
        const mins = Math.floor(pace);
        const secs = Math.round((pace - mins) * 60);
        return `${mins}:${secs.toString().padStart(2, '0')}`;
      };
      
      nominations = [
        {
          name: '📏 Дальний удар',
          icon: '📏',
          desc: 'Общий километраж',
          winners: byKm.slice(0, 3).map((p, i) => ({
            name: `${p.first_name} ${p.last_name}`,
            value: `${p.total_km} км`,
            medal: i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉'
          }))
        },
        {
          name: '⚡️ Ракета',
          icon: '⚡️',
          desc: 'Лучший средний темп',
          winners: byPace.slice(0, 3).map((p, i) => ({
            name: `${p.first_name} ${p.last_name}`,
            value: formatPaceDisplay(p.avg_pace),
            medal: i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉'
          }))
        },
        {
          name: '🔄 Трудоголик',
          icon: '🔄',
          desc: 'Больше всего тренировок',
          winners: byWorkouts.slice(0, 3).map((p, i) => ({
            name: `${p.first_name} ${p.last_name}`,
            value: `${p.total_workouts} тренировок`,
            medal: i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉'
          }))
        },
        {
          name: '⚔️ Хищник',
          icon: '⚔️',
          desc: 'Больше всего атак',
          winners: byAttacks.slice(0, 3).map((p, i) => ({
            name: `${p.first_name} ${p.last_name}`,
            value: `${p.attacks} атак`,
            medal: i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉'
          }))
        },
        {
          name: '❄️ Снежинки',
          icon: '❄️',
          desc: 'Больше всего снежинок',
          winners: bySnowflakes.slice(0, 3).map((p, i) => ({
            name: `${p.first_name} ${p.last_name}`,
            value: `${p.snowflake_balance || 0} ❄️`,
            medal: i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉'
          }))
        }
      ];
    };

    // Фильтрация и сортировка
    const applyFiltersAndSort = () => {
      let result = [...participants];
      
      // Фильтр по полу
      if (filterGender !== 'all') {
        result = result.filter(p => p.gender === filterGender);
      }
      
      // Поиск по имени
      if (searchQuery) {
        const query = searchQuery.toLowerCase();
        result = result.filter(p => 
          p.first_name.toLowerCase().includes(query) || 
          p.last_name.toLowerCase().includes(query)
        );
      }
      
      // Сортировка
      result.sort((a, b) => {
        let aVal = a[sortBy] || 0;
        let bVal = b[sortBy] || 0;
        
        if (sortBy === 'avg_pace') {
          if (aVal === 0 && bVal === 0) return 0;
          if (aVal === 0) return 1;
          if (bVal === 0) return -1;
          return sortOrder === 'asc' ? aVal - bVal : bVal - aVal;
        }
        
        return sortOrder === 'desc' ? bVal - aVal : aVal - bVal;
      });
      
      filteredParticipants = result;
    };

    // Обработчики
    const setTab = (tab) => {
      activeTab = tab;
      render();
    };

    const handleSort = (field) => {
      if (sortBy === field) {
        sortOrder = sortOrder === 'desc' ? 'asc' : 'desc';
      } else {
        sortBy = field;
        sortOrder = field === 'avg_pace' ? 'asc' : 'desc';
      }
      applyFiltersAndSort();
      render();
    };

    const handleFilterGender = (value) => {
      filterGender = value;
      applyFiltersAndSort();
      render();
    };

    const handleSearch = (value) => {
      searchQuery = value;
      applyFiltersAndSort();
      render();
    };

    // Рендер
    const renderLoading = () => {
      root.innerHTML = `<div class="loading"><div class="spinner"></div><p>Загрузка...</p></div>`;
    };

    const renderError = (msg) => {
      root.innerHTML = `<div class="error"><p>⚠️ ${msg}</p><button onclick="location.reload()">Повторить</button></div>`;
    };

    const render = () => {
      if (activeTab === 'rating') {
        root.innerHTML = `
          <div class="app">
            <header>
              <h1>🏔️ Королевская битва</h1>
              <p>Спортивный челлендж 2026</p>
            </header>
            <div class="search-box">
              <input type="text" id="searchInput" placeholder="🔍 Поиск по имени..." value="${searchQuery.replace(/"/g, '&quot;')}">
            </div>
            <div class="filters">
              <select id="genderFilter">
                <option value="all" ${filterGender === 'all' ? 'selected' : ''}>👥 Все участники</option>
                <option value="М" ${filterGender === 'М' ? 'selected' : ''}>👨 Мужчины</option>
                <option value="Ж" ${filterGender === 'Ж' ? 'selected' : ''}>👩 Женщины</option>
              </select>
            </div>
            <div class="sort-row">
              <button class="${sortBy === 'total_km' ? 'active' : ''}" onclick="handleSort('total_km')">📏 Км ${sortBy === 'total_km' ? (sortOrder === 'desc' ? '↓' : '↑') : ''}</button>
              <button class="${sortBy === 'total_workouts' ? 'active' : ''}" onclick="handleSort('total_workouts')">🏋️ Тренировки ${sortBy === 'total_workouts' ? (sortOrder === 'desc' ? '↓' : '↑') : ''}</button>
              <button class="${sortBy === 'total_min' ? 'active' : ''}" onclick="handleSort('total_min')">⏱️ Время ${sortBy === 'total_min' ? (sortOrder === 'desc' ? '↓' : '↑') : ''}</button>
              <button class="${sortBy === 'avg_pace' ? 'active' : ''}" onclick="handleSort('avg_pace')">⚡ Темп ${sortBy === 'avg_pace' ? (sortOrder === 'asc' ? '↑ (лучше)' : '↓ (хуже)') : ''}</button>
            </div>
            <div class="list">
              ${filteredParticipants.length === 0 ? '<div class="empty">Нет участников</div>' : 
                filteredParticipants.map((p, idx) => `
                  <div class="card">
                    <div class="rank">${getMedal(idx)}</div>
                    <div class="info">
                      <div class="name">${p.first_name} ${p.last_name} <span>${p.gender === 'Ж' ? '👩' : '👨'}</span></div>
                      <div class="stats">
                        <span>🏋️ ${p.total_workouts || 0}</span>
                        <span>⏱️ ${formatTime(p.total_min)}</span>
                        <span>⚡ ${formatPace(p.total_km, p.total_min)}/км</span>
                        <span>❄️ ${p.snowflake_balance || 0}</span>
                        <span>⚔️ ${p.attacks || 0}</span>
                        <span>📏 исх: ${formatOriginalKm(p.total_original_km)}</span>
                      </div>
                    </div>
                    <div class="km">${formatKm(p.total_km)}</div>
                  </div>
                `).join('')
              }
            </div>
          </div>
        `;
        
        document.getElementById('genderFilter')?.addEventListener('change', (e) => handleFilterGender(e.target.value));
        document.getElementById('searchInput')?.addEventListener('input', (e) => handleSearch(e.target.value));
      } else {
        root.innerHTML = `
          <div class="app">
            <header>
              <h1>🏔️ Королевская битва</h1>
              <p>Спортивный челлендж 2026</p>
            </header>
            <div class="tabs">
              <button onclick="setTab('rating')">🏆 Рейтинг</button>
              <button class="active" onclick="setTab('nominations')">🎯 Номинации</button>
            </div>
            <div class="nom-section">
              ${nominations.map(nom => `
                <div class="nom-title">${nom.icon} ${nom.name}</div>
                ${nom.winners.map(winner => `
                  <div class="nom-card">
                    <div class="nom-icon">${winner.medal}</div>
                    <div class="nom-info">
                      <div class="nom-name">${winner.name}</div>
                      <div class="nom-desc">${nom.desc}</div>
                    </div>
                    <div class="nom-value">
                      <div>${winner.value}</div>
                    </div>
                  </div>
                `).join('')}
              `).join('')}
            </div>
          </div>
        `;
      }
    };

    // Экспорт функций в глобальную область
    window.setTab = setTab;
    window.handleSort = handleSort;
    window.handleFilterGender = handleFilterGender;
    window.handleSearch = handleSearch;

    // Запуск
    loadData();
  </script>
</body>
</html>
