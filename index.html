<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Королевская битва — Рейтинг</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f2f2f7;
            --bg-secondary: #ffffff;
            --text-primary: #1c1c1e;
            --text-secondary: #8e8e93;
            --accent: #5E5CE0;
            --accent-light: #e9e9ff;
            --border: #e5e5ea;
            --gold: #ffd700;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #000000;
                --bg-secondary: #1c1c1e;
                --text-primary: #ffffff;
                --text-secondary: #8e8e93;
                --border: #2c2c2e;
                --accent-light: #2a2a3e;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.4;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px;
        }

        /* Header - уменьшенный */
        .header {
            background: linear-gradient(135deg, #5E5CE0 0%, #3A3A9E 100%);
            color: white;
            padding: 20px 16px;
            border-radius: 20px;
            margin-bottom: 16px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.85;
        }

        /* Tabs - компактные */
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            background: var(--bg-secondary);
            padding: 4px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            flex-wrap: wrap;
        }

        .tab {
            flex: 1;
            padding: 8px 12px;
            border: none;
            background: transparent;
            font-size: 14px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 2px 4px rgba(94,92,224,0.3);
        }

        /* Фильтры - компактные */
        .filters {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .filters-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-group {
            flex: 1;
            min-width: 120px;
        }

        .filter-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .search-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 13px;
            cursor: text;
        }

        /* Stats summary - компактная в строку */
        .stats-summary {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 10px 16px;
            flex: 1;
            min-width: 80px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .stat-card .value {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-card .label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* Таблица */
        .table-container {
            overflow-x: auto;
            background: var(--bg-secondary);
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            padding: 12px 8px;
            text-align: center;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        th:first-child {
            text-align: center;
        }

        th:nth-child(2) {
            text-align: left;
        }

        td {
            padding: 12px 8px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        td:first-child {
            text-align: center;
        }

        td:nth-child(2) {
            text-align: left;
        }

        td:nth-child(3),
        td:nth-child(4),
        td:nth-child(5),
        td:nth-child(6),
        td:nth-child(7),
        td:nth-child(8),
        td:nth-child(9),
        td:nth-child(10) {
            text-align: center;
        }

        tr:hover {
            background: var(--accent-light);
        }

        .medal {
            font-size: 18px;
            width: 28px;
            display: inline-block;
        }

        .medal-1 { color: var(--gold); }
        .medal-2 { color: var(--silver); }
        .medal-3 { color: var(--bronze); }

        .sort-icon {
            margin-left: 4px;
            font-size: 10px;
            opacity: 0.6;
        }

        th.active .sort-icon {
            opacity: 1;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 16px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-men {
            background: #007AFF20;
            color: #007AFF;
        }

        .badge-women {
            background: #FF2D5520;
            color: #FF2D55;
        }

        .weekly-points {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .week-point {
            background: var(--accent-light);
            padding: 3px 6px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            text-align: center;
            min-width: 32px;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            margin: 0 auto 12px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            th, td {
                padding: 8px 4px;
                font-size: 11px;
            }
            
            .week-point {
                font-size: 9px;
                padding: 2px 4px;
                min-width: 26px;
            }
            
            .badge {
                font-size: 9px;
                padding: 2px 6px;
            }
            
            .stat-card .value {
                font-size: 16px;
            }
            
            .stat-card .label {
                font-size: 10px;
            }
            
            .tab {
                font-size: 12px;
                padding: 6px 8px;
            }
            
            .header h1 {
                font-size: 18px;
            }
            
            .medal {
                font-size: 14px;
                width: 22px;
            }
        }

        /* Планшеты */
        @media (min-width: 769px) and (max-width: 1024px) {
            th, td {
                padding: 10px 6px;
                font-size: 12px;
            }
            
            .week-point {
                font-size: 10px;
                min-width: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏔️ КОРОЛЕВСКАЯ БИТВА</h1>
            <p>Спортивный челлендж 2026 — Рейтинг по очкам</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="setFilter('all')">🏆 Абсолют</button>
            <button class="tab" onclick="setFilter('М')">👨 Мужчины</button>
            <button class="tab" onclick="setFilter('Ж')">👩 Женщины</button>
        </div>

        <div class="stats-summary">
            <div class="stat-card">
                <div class="value" id="totalParticipants">0</div>
                <div class="label">Участников</div>
            </div>
            <div class="stat-card">
                <div class="value" id="totalWorkouts">0</div>
                <div class="label">Тренировок</div>
            </div>
            <div class="stat-card">
                <div class="value" id="totalKm">0</div>
                <div class="label">Всего км</div>
            </div>
        </div>

        <div class="filters">
            <div class="filters-row">
                <div class="filter-group">
                    <label>🔍 Поиск</label>
                    <input type="text" id="searchInput" class="search-input" placeholder="Имя или фамилия...">
                </div>
            </div>
        </div>

        <div class="table-container">
            <table id="ratingTable">
                <thead>
                    <tr>
                        <th onclick="sortBy('place')"># <span class="sort-icon">⇅</span></th>
                        <th onclick="sortBy('name')">Участник <span class="sort-icon">⇅</span></th>
                        <th onclick="sortBy('gender')">Пол <span class="sort-icon">⇅</span></th>
                        <th onclick="sortBy('workouts')">Тренировки <span class="sort-icon">⇅</span></th>
                        <th onclick="sortBy('km')">КМ <span class="sort-icon">⇅</span></th>
                        <th onclick="sortBy('time')">Время <span class="sort-icon">⇅</span></th>
                        <th onclick="sortBy('pace')">Темп <span class="sort-icon">⇅</span></th>
                        <th onclick="sortBy('snowflakes')">❄️ <span class="sort-icon">⇅</span></th>
                        <th>Очки по неделям</th>
                        <th onclick="sortBy('totalPoints')">Всего очков <span class="sort-icon">⇅</span></th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="10" class="loading"><div class="spinner"></div>Загрузка...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://ohaspovkdvtihosvzpli.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9oYXNwb3ZrZHZ0aWhvc3Z6cGxpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NjI1ODEsImV4cCI6MjA5MDEzODU4MX0.5OvphjjVlBP8hXvLMIALsD6pZn5453mkSEpCeOl8280';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let participants = [];
        let filteredParticipants = [];
        let currentFilter = 'all';
        let sortField = 'totalPoints';
        let sortDirection = 'desc';
        let searchQuery = '';

        const formatKm = (km) => `${km?.toFixed(1) || 0}`;
        const formatTime = (min) => {
            if (!min || min === 0) return '0';
            if (min < 60) return `${min}`;
            const hours = Math.floor(min / 60);
            const mins = min % 60;
            return `${hours}ч ${mins}м`;
        };
        const formatPace = (totalKm, totalMin) => {
            if (!totalKm || totalKm === 0) return '—';
            const pace = totalMin / totalKm;
            const mins = Math.floor(pace);
            const secs = Math.round((pace - mins) * 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        };

        const getMedal = (idx) => {
            if (idx === 0) return '<span class="medal medal-1">🥇</span>';
            if (idx === 1) return '<span class="medal medal-2">🥈</span>';
            if (idx === 2) return '<span class="medal medal-3">🥉</span>';
            return `${idx + 1}`;
        };

        const getGenderBadge = (gender) => {
            if (gender === 'М') return '<span class="badge badge-men">М</span>';
            if (gender === 'Ж') return '<span class="badge badge-women">Ж</span>';
            return '—';
        };

        async function loadData() {
            try {
                const { data: participantsData, error: participantsError } = await supabaseClient
                    .from('participants')
                    .select('*')
                    .eq('status', 'active');
                
                if (participantsError) throw participantsError;
                
                const { data: scoresData, error: scoresError } = await supabaseClient
                    .from('weekly_scores')
                    .select('*');
                
                if (scoresError) throw scoresError;
                
                const scoresByParticipant = {};
                for (const score of scoresData) {
                    if (!scoresByParticipant[score.participant_id]) {
                        scoresByParticipant[score.participant_id] = {
                            week1: 0, week2: 0, week3: 0, week4: 0, total: 0
                        };
                    }
                    const weekKey = `week${score.week_number}`;
                    scoresByParticipant[score.participant_id][weekKey] = score.total_points;
                    scoresByParticipant[score.participant_id].total += score.total_points;
                }
                
                participants = participantsData.map(p => {
                    let avg_pace = 0;
                    if (p.total_km > 0 && p.total_min > 0) {
                        avg_pace = p.total_min / p.total_km;
                    }
                    const scores = scoresByParticipant[p.id] || { week1: 0, week2: 0, week3: 0, week4: 0, total: 0 };
                    return {
                        id: p.id,
                        first_name: p.first_name,
                        last_name: p.last_name,
                        gender: p.gender,
                        total_workouts: p.total_workouts || 0,
                        total_km: parseFloat(p.total_km) || 0,
                        total_min: p.total_min || 0,
                        snowflake_balance: p.snowflake_balance || 0,
                        avg_pace: parseFloat(avg_pace.toFixed(2)),
                        week1_points: scores.week1,
                        week2_points: scores.week2,
                        week3_points: scores.week3,
                        week4_points: scores.week4,
                        total_points: scores.total
                    };
                });
                
                updateStatsSummary();
                applyFiltersAndSort();
                
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                document.getElementById('tableBody').innerHTML = `<tr><td colspan="10" class="empty">❌ Ошибка загрузки данных</td></tr>`;
            }
        }
        
        function updateStatsSummary() {
            const totalParticipants = participants.length;
            const totalWorkouts = participants.reduce((sum, p) => sum + p.total_workouts, 0);
            const totalKm = participants.reduce((sum, p) => sum + p.total_km, 0);
            
            document.getElementById('totalParticipants').textContent = totalParticipants;
            document.getElementById('totalWorkouts').textContent = totalWorkouts;
            document.getElementById('totalKm').textContent = totalKm.toFixed(1);
        }
        
        function applyFiltersAndSort() {
            let result = [...participants];
            
            if (currentFilter !== 'all') {
                result = result.filter(p => p.gender === currentFilter);
            }
            
            if (searchQuery) {
                const query = searchQuery.toLowerCase();
                result = result.filter(p => 
                    p.first_name.toLowerCase().includes(query) || 
                    p.last_name.toLowerCase().includes(query)
                );
            }
            
            result.sort((a, b) => {
                let aVal = a[sortField];
                let bVal = b[sortField];
                
                if (sortField === 'name') {
                    aVal = `${a.first_name} ${a.last_name}`;
                    bVal = `${b.first_name} ${b.last_name}`;
                    return sortDirection === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
                }
                
                if (sortField === 'gender') {
                    return sortDirection === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
                }
                
                if (sortField === 'pace') {
                    if (aVal === 0 && bVal === 0) return 0;
                    if (aVal === 0) return 1;
                    if (bVal === 0) return -1;
                    return sortDirection === 'asc' ? aVal - bVal : bVal - aVal;
                }
                
                return sortDirection === 'desc' ? bVal - aVal : aVal - bVal;
            });
            
            filteredParticipants = result;
            renderTable();
        }
        
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            
            if (filteredParticipants.length === 0) {
                tbody.innerHTML = `<tr><td colspan="10" class="empty">Нет участников с выбранными фильтрами</td></tr>`;
                return;
            }
            
            let html = '';
            filteredParticipants.forEach((p, idx) => {
                const globalPlace = participants.findIndex(x => x.id === p.id) + 1;
                html += `
                    <tr>
                        <td>${getMedal(globalPlace - 1)}</td>
                        <td><strong>${p.first_name} ${p.last_name}</strong></td>
                        <td>${getGenderBadge(p.gender)}</td>
                        <td>${p.total_workouts}</td>
                        <td>${formatKm(p.total_km)}</td>
                        <td>${formatTime(p.total_min)}</td>
                        <td>${formatPace(p.total_km, p.total_min)}</td>
                        <td>${p.snowflake_balance}</td>
                        <td>
                            <div class="weekly-points">
                                <div class="week-point">${p.week1_points}</div>
                                <div class="week-point">${p.week2_points}</div>
                                <div class="week-point">${p.week3_points}</div>
                                <div class="week-point">${p.week4_points}</div>
                            </div>
                        </td>
                        <td><strong style="font-size: 16px; color: var(--accent);">${p.total_points}</strong></td>
                    </tr>
                `;
            });
            
            tbody.innerHTML = html;
        }
        
        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.tab').forEach((tab, i) => {
                if ((filter === 'all' && i === 0) || (filter === 'М' && i === 1) || (filter === 'Ж' && i === 2)) {
                    tab.classList.add('active');
                } else {
                    tab.classList.remove('active');
                }
            });
            applyFiltersAndSort();
        }
        
        function sortBy(field) {
            if (sortField === field) {
                sortDirection = sortDirection === 'desc' ? 'asc' : 'desc';
            } else {
                sortField = field;
                sortDirection = 'desc';
            }
            
            document.querySelectorAll('th').forEach(th => th.classList.remove('active'));
            const ths = document.querySelectorAll('th');
            const fieldIndex = {
                'place': 0, 'name': 1, 'gender': 2, 'workouts': 3,
                'km': 4, 'time': 5, 'pace': 6, 'snowflakes': 7, 'totalPoints': 9
            };
            if (fieldIndex[field] !== undefined) {
                ths[fieldIndex[field]].classList.add('active');
            }
            
            applyFiltersAndSort();
        }
        
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            applyFiltersAndSort();
        });
        
        loadData();
        
        window.setFilter = setFilter;
        window.sortBy = sortBy;
    </script>
</body>
</html>
