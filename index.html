<script>
    const API_URL = 'https://stroitelev91.pythonanywhere.com/create-landing-payment';
    
    const payButton = document.getElementById('payButton');
    const loading = document.getElementById('loading');
    const formCard = document.getElementById('formCard');
    const successMessage = document.getElementById('successMessage');
    const globalError = document.getElementById('globalError');
    const paymentFormContainer = document.getElementById('payment-form');
    
    const firstName = document.getElementById('firstName');
    const lastName = document.getElementById('lastName');
    const gender = document.getElementById('gender');
    const agreeRules = document.getElementById('agreeRules');
    
    const firstNameError = document.getElementById('firstNameError');
    const lastNameError = document.getElementById('lastNameError');
    const genderError = document.getElementById('genderError');
    const agreeError = document.getElementById('agreeError');
    
    let checkoutWidget = null;
    
    function validateForm() {
        let isValid = true;
        
        if (!firstName.value.trim()) {
            firstName.classList.add('error');
            firstNameError.style.display = 'block';
            isValid = false;
        } else {
            firstName.classList.remove('error');
            firstNameError.style.display = 'none';
        }
        
        if (!lastName.value.trim()) {
            lastName.classList.add('error');
            lastNameError.style.display = 'block';
            isValid = false;
        } else {
            lastName.classList.remove('error');
            lastNameError.style.display = 'none';
        }
        
        if (!gender.value) {
            gender.classList.add('error');
            genderError.style.display = 'block';
            isValid = false;
        } else {
            gender.classList.remove('error');
            genderError.style.display = 'none';
        }
        
        if (!agreeRules.checked) {
            agreeError.style.display = 'block';
            isValid = false;
        } else {
            agreeError.style.display = 'none';
        }
        
        return isValid;
    }
    
    payButton.addEventListener('click', async function() {
        if (!validateForm()) {
            return;
        }
        
        payButton.style.display = 'none';
        loading.style.display = 'block';
        globalError.style.display = 'none';
        
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    first_name: firstName.value.trim(),
                    last_name: lastName.value.trim(),
                    gender: gender.value
                })
            });
            
            const data = await response.json();
            
            if (!data.success) {
                throw new Error(data.error || 'Не удалось создать платеж');
            }
            
            // Инициализируем виджет
            checkoutWidget = new window.YooMoneyCheckoutWidget({
                confirmation_token: data.confirmation_token,
                
                // ВАЖНО: НЕ передаём return_url, чтобы виджет не редиректил
                // return_url: 'https://mrbodya1.github.io/YUB/thankyou.html',
                
                // Вместо этого используем колбэки
                onSuccess: function(paymentData) {
                    console.log('✅ Оплата успешна!', paymentData);
                    
                    // Скрываем виджет
                    if (checkoutWidget) {
                        checkoutWidget.destroy();
                    }
                    
                    // Показываем страницу "Спасибо"
                    loading.style.display = 'none';
                    formCard.style.display = 'none';
                    paymentFormContainer.style.display = 'none';
                    successMessage.style.display = 'block';
                },
                
                onError: function(error) {
                    console.error('❌ Ошибка виджета:', error);
                    loading.style.display = 'none';
                    payButton.style.display = 'block';
                    paymentFormContainer.style.display = 'none';
                    globalError.textContent = 'Ошибка оплаты. Попробуй ещё раз или используй другую карту.';
                    globalError.style.display = 'block';
                },
                
                onClose: function() {
                    console.log('Виджет закрыт без оплаты');
                    loading.style.display = 'none';
                    payButton.style.display = 'block';
                    paymentFormContainer.style.display = 'none';
                },
                
                // Настройка модального окна
                customization: {
                    modal: true  // ← ВАЖНО: открывает виджет в модальном окне
                }
            });
            
            // Отображаем виджет
            checkoutWidget.render('payment-form')
                .then(() => {
                    console.log('Виджет загружен');
                    loading.style.display = 'none';
                    paymentFormContainer.style.display = 'block';
                })
                .catch(error => {
                    console.error('Ошибка рендеринга:', error);
                    throw new Error('Не удалось загрузить форму оплаты');
                });
                
        } catch (error) {
            loading.style.display = 'none';
            payButton.style.display = 'block';
            globalError.textContent = error.message;
            globalError.style.display = 'block';
        }
    });
    
    // Очистка ошибок
    firstName.addEventListener('input', () => {
        firstName.classList.remove('error');
        firstNameError.style.display = 'none';
        globalError.style.display = 'none';
    });
    
    lastName.addEventListener('input', () => {
        lastName.classList.remove('error');
        lastNameError.style.display = 'none';
        globalError.style.display = 'none';
    });
    
    gender.addEventListener('change', () => {
        gender.classList.remove('error');
        genderError.style.display = 'none';
        globalError.style.display = 'none';
    });
    
    agreeRules.addEventListener('change', () => {
        agreeError.style.display = 'none';
        globalError.style.display = 'none';
    });
</script>
