<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#f5af19">
    <title>Рейтинг — Королевская Битва</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #f5af19;
            --primary-dark: #d97706;
            --primary-light: #fef3c7;
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --bg-tertiary: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-tertiary: #64748b;
            --border-light: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-tertiary);
            min-height: 100vh;
            color: var(--text-primary);
            line-height: 1.5;
            font-size: 15px;
            padding: 16px 12px;
            -webkit-font-smoothing: antialiased;
        }
        
        .container {
            max-width: 100%;
            margin: 0 auto;
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            padding: 20px 16px;
            box-shadow: var(--shadow-md);
            overflow-x: auto;
        }
        
        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 6px;
            color: var(--text-primary);
        }
        
        .subtitle {
            text-align: center;
            color: var(--text-tertiary);
            font-size: 0.9rem;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 16px;
        }
        
        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .search-box {
            flex: 2;
            min-width: 180px;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: 1rem;
            background: var(--bg-secondary);
        }
        
        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .gender-filter {
            flex: 1;
            min-width: 120px;
        }
        
        .gender-filter select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: 1rem;
            background: var(--bg-secondary);
            cursor: pointer;
        }
        
        .gender-filter select:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .stats-summary {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 12px;
            background: var(--primary-light);
            border-radius: var(--radius-md);
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-dark);
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-tertiary);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 800px;
        }
        
        th {
            background: var(--primary);
            color: white;
            padding: 12px 8px;
            text-align: left;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        
        th:hover {
            background: var(--primary-dark);
        }
        
        th.sort-asc::after {
            content: ' ▲';
            font-size: 0.7rem;
        }
        
        th.sort-desc::after {
            content: ' ▼';
            font-size: 0.7rem;
        }
        
        td {
            padding: 10px 8px;
            border-bottom: 1px solid var(--border-light);
        }
        
        tr:hover {
            background: var(--bg-secondary);
        }
        
        .medal-1 {
            background: linear-gradient(135deg, #ffd70020, #ffd70005);
        }
        
        .medal-2 {
            background: linear-gradient(135deg, #c0c0c020, #c0c0c005);
        }
        
        .medal-3 {
            background: linear-gradient(135deg, #cd7f3220, #cd7f3205);
        }
        
        .footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border-light);
            color: var(--text-tertiary);
            font-size: 0.85rem;
        }
        
        .footer a {
            color: var(--primary-dark);
            text-decoration: none;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-tertiary);
        }
        
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            border-bottom: 2px solid var(--border-light);
        }
        
        .tab {
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-tertiary);
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: var(--radius-sm) var(--radius-sm) 0 0;
        }
        
        .tab:hover {
            background: var(--bg-secondary);
        }
        
        .tab.active {
            color: var(--primary-dark);
            border-bottom: 2px solid var(--primary);
            margin-bottom: -2px;
        }
        
        @media (max-width: 480px) {
            body {
                padding: 8px 4px;
            }
            
            .container {
                padding: 16px 12px;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            table {
                font-size: 0.8rem;
            }
            
            th, td {
                padding: 8px 4px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 РЕЙТИНГ</h1>
        <div class="subtitle">Королевская Битва 2026</div>
        
        <div class="tabs">
            <button class="tab active" data-tab="overall">Общий</button>
            <button class="tab" data-tab="men">Мужчины</button>
            <button class="tab" data-tab="women">Женщины</button>
        </div>
        
        <div class="filters">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Поиск по имени...">
            </div>
            <div class="gender-filter">
                <select id="genderFilter">
                    <option value="all">Все</option>
                    <option value="М">Мужчины</option>
                    <option value="Ж">Женщины</option>
                </select>
            </div>
        </div>
        
        <div class="stats-summary" id="statsSummary">
            <div class="stat-item">
                <div class="stat-value" id="totalParticipants">0</div>
                <div class="stat-label">Участников</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalKm">0</div>
                <div class="stat-label">Всего км</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalWorkouts">0</div>
                <div class="stat-label">Тренировок</div>
            </div>
        </div>
        
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th data-sort="place">#</th>
                        <th data-sort="first_name">Имя</th>
                        <th data-sort="gender">Пол</th>
                        <th data-sort="total_km">Км</th>
                        <th data-sort="total_workouts">Трен.</th>
                        <th data-sort="avg_pace">Темп</th>
                        <th data-sort="snowflake_balance">🌼</th>
                        <th data-sort="total_points">Очки</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="8" class="loading">Загрузка данных...</td></tr>
                </tbody>
            </table>
        </div>
        
        <div class="footer">
            <a href="index.html">← На главную</a> • 
            <a href="rules.html">Правила</a> • 
            <a href="https://vk.me/club114046577">Бот</a>
        </div>
    </div>
    
    <script>
        let participants = [];
        let filteredParticipants = [];
        let sortColumn = 'total_km';
        let sortDirection = 'desc';
        let currentTab = 'overall';

        async function loadData() {
            try {
                const response = await fetch('https://stroitelev91.pythonanywhere.com/api/rating');
                participants = await response.json();
                
                // Добавляем вычисляемые поля
                participants.forEach(p => {
                    p.avg_pace = p.total_km > 0 ? p.total_min / p.total_km : 0;
                });
                
                applyFilters();
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                document.getElementById('tableBody').innerHTML = 
                    '<tr><td colspan="8" style="text-align: center; padding: 40px;">Ошибка загрузки данных</td></tr>';
            }
        }

        function applyFilters() {
            const searchInput = document.getElementById('searchInput');
            const genderFilter = document.getElementById('genderFilter');
            
            const searchTerm = searchInput.value.toLowerCase();
            const gender = genderFilter.value;
            
            // Сначала фильтруем по полу (из селекта)
            filteredParticipants = participants.filter(p => {
                if (gender !== 'all' && p.gender !== gender) return false;
                return true;
            });
            
            // Затем по табу
            if (currentTab === 'men') {
                filteredParticipants = filteredParticipants.filter(p => p.gender === 'М');
            } else if (currentTab === 'women') {
                filteredParticipants = filteredParticipants.filter(p => p.gender === 'Ж');
            }
            
            // Поиск по имени
            if (searchTerm) {
                filteredParticipants = filteredParticipants.filter(p => 
                    p.first_name.toLowerCase().includes(searchTerm) || 
                    p.last_name.toLowerCase().includes(searchTerm)
                );
            }
            
            updateStats();
            sortAndRender();
        }

        function updateStats() {
            const total = filteredParticipants.length;
            const totalKm = filteredParticipants.reduce((sum, p) => sum + (p.total_km || 0), 0);
            const totalWorkouts = filteredParticipants.reduce((sum, p) => sum + (p.total_workouts || 0), 0);
            
            document.getElementById('totalParticipants').textContent = total;
            document.getElementById('totalKm').textContent = Math.round(totalKm);
            document.getElementById('totalWorkouts').textContent = totalWorkouts;
        }

        function sortAndRender() {
            // Сортировка
            filteredParticipants.sort((a, b) => {
                let aVal = a[sortColumn];
                let bVal = b[sortColumn];
                
                // Числовые колонки
                if (['total_km', 'total_workouts', 'avg_pace', 'snowflake_balance', 'total_points'].includes(sortColumn)) {
                    aVal = parseFloat(aVal) || 0;
                    bVal = parseFloat(bVal) || 0;
                } else if (sortColumn === 'place') {
                    // Место определяется после сортировки
                    return 0;
                } else {
                    // Строковые колонки
                    aVal = String(aVal || '').toLowerCase();
                    bVal = String(bVal || '').toLowerCase();
                }
                
                if (sortDirection === 'asc') {
                    return aVal > bVal ? 1 : aVal < bVal ? -1 : 0;
                } else {
                    return aVal < bVal ? 1 : aVal > bVal ? -1 : 0;
                }
            });
            
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            
            if (filteredParticipants.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 40px;">Участники не найдены</td></tr>';
                return;
            }
            
            tbody.innerHTML = filteredParticipants.map((p, index) => {
                const place = index + 1;
                const pace = p.avg_pace > 0 ? p.avg_pace.toFixed(2) : '—';
                const points = p.total_points || 0;
                
                let medalClass = '';
                if (place === 1) medalClass = 'medal-1';
                else if (place === 2) medalClass = 'medal-2';
                else if (place === 3) medalClass = 'medal-3';
                
                return `
                    <tr class="${medalClass}">
                        <td>${place}</td>
                        <td>${p.first_name} ${p.last_name}</td>
                        <td>${p.gender === 'М' ? 'М' : 'Ж'}</td>
                        <td>${p.total_km || 0}</td>
                        <td>${p.total_workouts || 0}</td>
                        <td>${pace}</td>
                        <td>${p.snowflake_balance || 0}</td>
                        <td>${points}</td>
                    </tr>
                `;
            }).join('');
            
            // Обновляем индикаторы сортировки
            document.querySelectorAll('th[data-sort]').forEach(th => {
                const field = th.dataset.sort;
                th.classList.remove('sort-asc', 'sort-desc');
                if (field === sortColumn) {
                    th.classList.add(sortDirection === 'asc' ? 'sort-asc' : 'sort-desc');
                }
            });
        }

        // Обработчики сортировки
        document.querySelectorAll('th[data-sort]').forEach(th => {
            th.addEventListener('click', () => {
                const field = th.dataset.sort;
                if (field === 'place') {
                    sortColumn = 'total_km';
                } else {
                    sortColumn = field;
                }
                
                if (sortColumn === field && sortColumn !== 'place') {
                    sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
                } else {
                    sortDirection = field === 'first_name' ? 'asc' : 'desc';
                }
                
                sortAndRender();
            });
        });

        // Обработчики фильтров
        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('genderFilter').addEventListener('change', applyFilters);
        
        // Обработчики табов
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentTab = tab.dataset.tab;
                
                // Синхронизируем селект пола с табом
                const genderFilter = document.getElementById('genderFilter');
                if (currentTab === 'men') {
                    genderFilter.value = 'М';
                } else if (currentTab === 'women') {
                    genderFilter.value = 'Ж';
                } else {
                    genderFilter.value = 'all';
                }
                
                applyFilters();
            });
        });
        
        // Загрузка при старте
        loadData();
        
        // Автообновление каждые 60 секунд
        setInterval(loadData, 60000);
    </script>
</body>
</html>
