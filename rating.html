<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#f5af19">
    <title>Рейтинг — Королевская Битва</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #f5af19;
            --primary-dark: #d97706;
            --primary-light: #fef3c7;
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --bg-tertiary: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-tertiary: #64748b;
            --border-light: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --gold: #ffd700;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-tertiary);
            min-height: 100vh;
            color: var(--text-primary);
            line-height: 1.5;
            font-size: 15px;
            padding: 16px 12px;
            -webkit-font-smoothing: antialiased;
        }
        
        .container {
            max-width: 100%;
            margin: 0 auto;
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            padding: 24px 20px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
        }
        
        h1 {
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 6px;
            color: var(--text-primary);
        }
        
        .subtitle {
            text-align: center;
            color: var(--text-tertiary);
            font-size: 0.95rem;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 18px;
        }
        
        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        
        .search-box {
            flex: 2;
            min-width: 200px;
        }
        
        .search-box input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: 1rem;
            background: var(--bg-secondary);
            transition: border-color 0.2s;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .gender-filter {
            flex: 1;
            min-width: 140px;
        }
        
        .gender-filter select {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: 1rem;
            background: var(--bg-secondary);
            cursor: pointer;
            transition: border-color 0.2s;
        }
        
        .gender-filter select:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-light);
        }
        
        .tab {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-tertiary);
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: var(--radius-sm) var(--radius-sm) 0 0;
        }
        
        .tab:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
        
        .tab.active {
            color: var(--primary-dark);
            border-bottom: 3px solid var(--primary);
            margin-bottom: -2px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 28px;
        }
        
        .stat-card {
            background: var(--primary-light);
            border-radius: var(--radius-md);
            padding: 16px 12px;
            text-align: center;
            border: 1px solid var(--primary);
        }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary-dark);
            line-height: 1.2;
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .week-selector {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        
        .week-selector label {
            font-weight: 500;
            color: var(--text-secondary);
        }
        
        .week-selector select {
            padding: 10px 16px;
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            background: var(--bg-secondary);
            cursor: pointer;
        }
        
        .table-wrapper {
            overflow-x: auto;
            margin-bottom: 20px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-light);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            min-width: 1200px;
        }
        
        th {
            background: var(--primary);
            color: white;
            padding: 14px 10px;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
            transition: background 0.2s;
        }
        
        th:first-child {
            text-align: left;
        }
        
        th:hover {
            background: var(--primary-dark);
        }
        
        th.sort-asc::after {
            content: ' ▲';
            font-size: 0.7rem;
            opacity: 0.8;
        }
        
        th.sort-desc::after {
            content: ' ▼';
            font-size: 0.7rem;
            opacity: 0.8;
        }
        
        td {
            padding: 12px 10px;
            border-bottom: 1px solid var(--border-light);
            text-align: center;
        }
        
        td:first-child {
            text-align: left;
        }
        
        tr:hover {
            background: var(--bg-secondary);
        }
        
        .medal-1 td:first-child {
            position: relative;
        }
        
        .medal-1 td:first-child::before {
            content: '🥇';
            position: absolute;
            left: -8px;
            font-size: 1.2rem;
        }
        
        .medal-2 td:first-child::before {
            content: '🥈';
            position: absolute;
            left: -8px;
            font-size: 1.2rem;
        }
        
        .medal-3 td:first-child::before {
            content: '🥉';
            position: absolute;
            left: -8px;
            font-size: 1.2rem;
        }
        
        .medal-1 {
            background: linear-gradient(135deg, #ffd70008, #ffd70002);
        }
        
        .medal-2 {
            background: linear-gradient(135deg, #c0c0c008, #c0c0c002);
        }
        
        .medal-3 {
            background: linear-gradient(135deg, #cd7f3208, #cd7f3202);
        }
        
        .footer {
            text-align: center;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid var(--border-light);
            color: var(--text-tertiary);
            font-size: 0.9rem;
        }
        
        .footer a {
            color: var(--primary-dark);
            text-decoration: none;
            font-weight: 500;
            margin: 0 8px;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
        
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-tertiary);
            font-size: 1.1rem;
        }
        
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-left: 10px;
            border: 2px solid var(--border-light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .points-week {
            font-weight: 500;
            color: var(--text-secondary);
        }
        
        .points-total {
            font-weight: 700;
            color: var(--primary-dark);
        }
        
        @media (max-width: 600px) {
            body {
                padding: 8px 4px;
            }
            
            .container {
                padding: 18px 14px;
            }
            
            h1 {
                font-size: 1.6rem;
            }
            
            table {
                font-size: 0.8rem;
            }
            
            th, td {
                padding: 8px 6px;
            }
            
            .stat-value {
                font-size: 1.4rem;
            }
            
            .medal-1 td:first-child::before,
            .medal-2 td:first-child::before,
            .medal-3 td:first-child::before {
                left: -4px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 РЕЙТИНГ</h1>
        <div class="subtitle">Королевская Битва • 27 апреля — 17 мая 2026</div>
        
        <div class="tabs">
            <button class="tab active" data-tab="overall">🏔️ Общий</button>
            <button class="tab" data-tab="men">👨 Мужчины</button>
            <button class="tab" data-tab="women">👩 Женщины</button>
        </div>
        
        <div class="filters">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Поиск по имени...">
            </div>
            <div class="gender-filter">
                <select id="genderFilter">
                    <option value="all">Все участники</option>
                    <option value="М">Только мужчины</option>
                    <option value="Ж">Только женщины</option>
                </select>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalParticipants">0</div>
                <div class="stat-label">Участников</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalKm">0</div>
                <div class="stat-label">Всего км</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalWorkouts">0</div>
                <div class="stat-label">Тренировок</div>
            </div>
        </div>
        
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th data-sort="place">#</th>
                        <th data-sort="first_name" style="text-align: left;">Участник</th>
                        <th data-sort="gender">Пол</th>
                        <th data-sort="total_km">Всего км</th>
                        <th data-sort="total_workouts">Трен.</th>
                        <th data-sort="avg_pace">Темп</th>
                        <th data-sort="snowflake_balance">🌼</th>
                        <th data-sort="week1_points" id="week1Header">Нед 1</th>
                        <th data-sort="week2_points" id="week2Header">Нед 2</th>
                        <th data-sort="week3_points" id="week3Header">Нед 3</th>
                        <th data-sort="total_points">Всего очков</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="11" class="loading">Загрузка данных...</td></tr>
                </tbody>
            </table>
        </div>
        
        <div class="footer">
            <a href="index.html">← На главную</a> • 
            <a href="rules.html">📜 Правила</a> • 
            <a href="https://vk.me/club114046577">💬 Бот</a>
        </div>
    </div>
    
    <script>
        let participants = [];
        let weeklyScores = [];
        let filteredParticipants = [];
        let sortColumn = 'total_km';
        let sortDirection = 'desc';
        let currentTab = 'overall';

        async function loadData() {
            try {
                // Загружаем участников
                const participantsRes = await fetch('https://stroitelev91.pythonanywhere.com/api/rating');
                participants = await participantsRes.json();
                
                // Загружаем очки по неделям
                try {
                    const scoresRes = await fetch('https://stroitelev91.pythonanywhere.com/api/weekly-scores');
                    weeklyScores = await scoresRes.json();
                } catch (e) {
                    console.log('Очки по неделям не загружены');
                }
                
                // Добавляем вычисляемые поля
                participants.forEach(p => {
                    p.avg_pace = p.total_km > 0 ? p.total_min / p.total_km : 0;
                    
                    // Очки по неделям
                    const scores = weeklyScores.filter(s => s.participant_id === p.id);
                    p.week1_points = scores.find(s => s.week_number === 1)?.total_points || 0;
                    p.week2_points = scores.find(s => s.week_number === 2)?.total_points || 0;
                    p.week3_points = scores.find(s => s.week_number === 3)?.total_points || 0;
                    p.total_points = p.week1_points + p.week2_points + p.week3_points;
                });
                
                applyFilters();
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                document.getElementById('tableBody').innerHTML = 
                    '<tr><td colspan="11" style="text-align: center; padding: 40px;">Ошибка загрузки данных</td></tr>';
            }
        }

        function applyFilters() {
            const searchInput = document.getElementById('searchInput');
            const genderFilter = document.getElementById('genderFilter');
            
            const searchTerm = searchInput.value.toLowerCase();
            const gender = genderFilter.value;
            
            filteredParticipants = participants.filter(p => {
                if (gender !== 'all' && p.gender !== gender) return false;
                return true;
            });
            
            if (currentTab === 'men') {
                filteredParticipants = filteredParticipants.filter(p => p.gender === 'М');
            } else if (currentTab === 'women') {
                filteredParticipants = filteredParticipants.filter(p => p.gender === 'Ж');
            }
            
            if (searchTerm) {
                filteredParticipants = filteredParticipants.filter(p => 
                    p.first_name.toLowerCase().includes(searchTerm) || 
                    p.last_name.toLowerCase().includes(searchTerm)
                );
            }
            
            updateStats();
            sortAndRender();
        }

        function updateStats() {
            const total = filteredParticipants.length;
            const totalKm = filteredParticipants.reduce((sum, p) => sum + (p.total_km || 0), 0);
            const totalWorkouts = filteredParticipants.reduce((sum, p) => sum + (p.total_workouts || 0), 0);
            
            document.getElementById('totalParticipants').textContent = total;
            document.getElementById('totalKm').textContent = Math.round(totalKm);
            document.getElementById('totalWorkouts').textContent = totalWorkouts;
        }

        function sortAndRender() {
            filteredParticipants.sort((a, b) => {
                let aVal = a[sortColumn];
                let bVal = b[sortColumn];
                
                if (['total_km', 'total_workouts', 'avg_pace', 'snowflake_balance', 'total_points', 'week1_points', 'week2_points', 'week3_points'].includes(sortColumn)) {
                    aVal = parseFloat(aVal) || 0;
                    bVal = parseFloat(bVal) || 0;
                } else if (sortColumn === 'place') {
                    return 0;
                } else {
                    aVal = String(aVal || '').toLowerCase();
                    bVal = String(bVal || '').toLowerCase();
                }
                
                if (sortDirection === 'asc') {
                    return aVal > bVal ? 1 : aVal < bVal ? -1 : 0;
                } else {
                    return aVal < bVal ? 1 : aVal > bVal ? -1 : 0;
                }
            });
            
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            
            if (filteredParticipants.length === 0) {
                tbody.innerHTML = '<tr><td colspan="11" style="text-align: center; padding: 40px;">Участники не найдены</td></tr>';
                return;
            }
            
            tbody.innerHTML = filteredParticipants.map((p, index) => {
                const place = index + 1;
                const pace = p.avg_pace > 0 ? p.avg_pace.toFixed(2) : '—';
                
                let medalClass = '';
                if (place === 1) medalClass = 'medal-1';
                else if (place === 2) medalClass = 'medal-2';
                else if (place === 3) medalClass = 'medal-3';
                
                // Место с медалькой
                let placeDisplay = place;
                if (place === 1) placeDisplay = '🥇 1';
                else if (place === 2) placeDisplay = '🥈 2';
                else if (place === 3) placeDisplay = '🥉 3';
                
                return `
                    <tr class="${medalClass}">
                        <td style="font-weight: 600;">${placeDisplay}</td>
                        <td style="text-align: left;">${p.first_name} ${p.last_name}</td>
                        <td>${p.gender === 'М' ? 'М' : 'Ж'}</td>
                        <td>${p.total_km || 0}</td>
                        <td>${p.total_workouts || 0}</td>
                        <td>${pace}</td>
                        <td>${p.snowflake_balance || 0}</td>
                        <td class="points-week">${p.week1_points || 0}</td>
                        <td class="points-week">${p.week2_points || 0}</td>
                        <td class="points-week">${p.week3_points || 0}</td>
                        <td class="points-total">${p.total_points || 0}</td>
                    </tr>
                `;
            }).join('');
            
            document.querySelectorAll('th[data-sort]').forEach(th => {
                const field = th.dataset.sort;
                th.classList.remove('sort-asc', 'sort-desc');
                if (field === sortColumn) {
                    th.classList.add(sortDirection === 'asc' ? 'sort-asc' : 'sort-desc');
                }
            });
        }

        document.querySelectorAll('th[data-sort]').forEach(th => {
            th.addEventListener('click', () => {
                const field = th.dataset.sort;
                if (field === 'place') {
                    sortColumn = 'total_km';
                } else {
                    sortColumn = field;
                }
                
                if (sortColumn === field && sortColumn !== 'place') {
                    sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
                } else {
                    sortDirection = field === 'first_name' ? 'asc' : 'desc';
                }
                
                sortAndRender();
            });
        });

        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('genderFilter').addEventListener('change', applyFilters);
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentTab = tab.dataset.tab;
                
                const genderFilter = document.getElementById('genderFilter');
                if (currentTab === 'men') {
                    genderFilter.value = 'М';
                } else if (currentTab === 'women') {
                    genderFilter.value = 'Ж';
                } else {
                    genderFilter.value = 'all';
                }
                
                applyFilters();
            });
        });
        
        loadData();
        setInterval(loadData, 60000);
    </script>
</body>
</html>
