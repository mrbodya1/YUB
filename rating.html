<script>
    let participants = [];
    let sortColumn = 'total_km';
    let sortDirection = 'desc';

    async function loadData() {
        try {
            const response = await fetch('https://stroitelev91.pythonanywhere.com/api/rating');
            participants = await response.json();
            renderTable();
        } catch (error) {
            console.error('Ошибка загрузки:', error);
            document.getElementById('tableBody').innerHTML = 
                '<tr><td colspan="8" style="text-align: center; padding: 40px;">Ошибка загрузки данных</td></tr>';
        }
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        const searchInput = document.getElementById('searchInput');
        const genderFilter = document.getElementById('genderFilter');
        
        const searchTerm = searchInput ? searchInput.value.toLowerCase() : '';
        const gender = genderFilter ? genderFilter.value : 'all';
        
        // Фильтрация
        let filtered = participants.filter(p => {
            const nameMatch = p.first_name.toLowerCase().includes(searchTerm) || 
                             p.last_name.toLowerCase().includes(searchTerm);
            const genderMatch = gender === 'all' || p.gender === gender;
            return nameMatch && genderMatch;
        });
        
        // Сортировка (исправлено!)
        filtered.sort((a, b) => {
            let aVal = a[sortColumn];
            let bVal = b[sortColumn];
            
            // Числовые колонки
            if (['total_km', 'total_workouts', 'avg_pace', 'snowflake_balance', 'total_points'].includes(sortColumn)) {
                aVal = parseFloat(aVal) || 0;
                bVal = parseFloat(bVal) || 0;
            } else {
                // Строковые колонки
                aVal = String(aVal || '').toLowerCase();
                bVal = String(bVal || '').toLowerCase();
            }
            
            if (sortDirection === 'asc') {
                return aVal > bVal ? 1 : aVal < bVal ? -1 : 0;
            } else {
                return aVal < bVal ? 1 : aVal > bVal ? -1 : 0;
            }
        });
        
        // Рендер
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 40px;">Участники не найдены</td></tr>';
            return;
        }
        
        tbody.innerHTML = filtered.map((p, index) => {
            const place = sortDirection === 'desc' ? index + 1 : filtered.length - index;
            const pace = p.avg_pace ? p.avg_pace.toFixed(2) : '—';
            const points = p.total_points || 0;
            
            return `
                <tr>
                    <td>${place}</td>
                    <td>${p.first_name} ${p.last_name}</td>
                    <td>${p.gender === 'М' ? 'Муж' : 'Жен'}</td>
                    <td>${p.total_km || 0}</td>
                    <td>${p.total_workouts || 0}</td>
                    <td>${pace}</td>
                    <td>${p.snowflake_balance || 0}</td>
                    <td>${points}</td>
                </tr>
            `;
        }).join('');
        
        // Обновляем индикаторы сортировки
        document.querySelectorAll('th[data-sort]').forEach(th => {
            const field = th.dataset.sort;
            th.classList.remove('sort-asc', 'sort-desc');
            if (field === sortColumn) {
                th.classList.add(sortDirection === 'asc' ? 'sort-asc' : 'sort-desc');
            }
        });
    }

    // Обработчики сортировки
    document.querySelectorAll('th[data-sort]').forEach(th => {
        th.addEventListener('click', () => {
            const field = th.dataset.sort;
            if (sortColumn === field) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = field;
                // Для числовых полей по умолчанию desc (больше → меньше)
                // Для имени — asc (А → Я)
                sortDirection = field === 'first_name' ? 'asc' : 'desc';
            }
            renderTable();
        });
    });

    // Обработчики фильтров
    document.getElementById('searchInput').addEventListener('input', renderTable);
    document.getElementById('genderFilter').addEventListener('change', renderTable);
    
    // Загрузка при старте
    loadData();
</script>
