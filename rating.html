<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#f5af19">
    <title>Рейтинг — Королевская Битва</title>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #f5af19;
            --primary-dark: #d97706;
            --primary-light: #fef3c7;
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --bg-tertiary: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-tertiary: #64748b;
            --border-light: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-tertiary);
            min-height: 100vh;
            color: var(--text-primary);
            line-height: 1.4;
            font-size: 14px;
            padding: 12px 8px;
            -webkit-font-smoothing: antialiased;
        }
        
        .container {
            max-width: 100%;
            margin: 0 auto;
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            padding: 16px 12px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
        }
        
        h1 {
            font-size: 1.6rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 4px;
            color: var(--text-primary);
        }
        
        .subtitle {
            text-align: center;
            color: var(--text-tertiary);
            font-size: 0.8rem;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 12px;
        }
        
        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .search-box {
            flex: 1;
        }
        
        .search-box input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            background: var(--bg-secondary);
            transition: border-color 0.2s;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 12px;
            border-bottom: 2px solid var(--border-light);
        }
        
        .tab {
            flex: 1;
            padding: 8px 0;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-tertiary);
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: var(--radius-sm) var(--radius-sm) 0 0;
            text-align: center;
        }
        
        .tab:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
        
        .tab.active {
            color: var(--primary-dark);
            border-bottom: 3px solid var(--primary);
            margin-bottom: -2px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .stat-card {
            background: var(--primary-light);
            border-radius: var(--radius-sm);
            padding: 8px 6px;
            text-align: center;
            border: 1px solid var(--primary);
        }
        
        .stat-value {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--primary-dark);
            line-height: 1.2;
        }
        
        .stat-label {
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        
        .table-wrapper {
            overflow-x: auto;
            margin-bottom: 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-light);
        }
        
        table {
            width: auto;
            min-width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            white-space: nowrap;
        }
        
        th {
            background: var(--primary);
            color: white;
            padding: 8px 6px;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }
        
        th:first-child, th:nth-child(2) {
            text-align: left;
        }
        
        th:hover {
            background: var(--primary-dark);
        }
        
        th.sort-asc::after {
            content: ' ▲';
            font-size: 0.6rem;
            opacity: 0.8;
        }
        
        th.sort-desc::after {
            content: ' ▼';
            font-size: 0.6rem;
            opacity: 0.8;
        }
        
        td {
            padding: 6px 6px;
            border-bottom: 1px solid var(--border-light);
            text-align: center;
        }
        
        td:first-child, td:nth-child(2) {
            text-align: left;
        }
        
        tr:hover {
            background: var(--bg-secondary);
        }
        
        .footer {
            text-align: center;
            padding-top: 16px;
            border-top: 1px solid var(--border-light);
            color: var(--text-tertiary);
            font-size: 0.8rem;
        }
        
        .footer a {
            color: var(--primary-dark);
            text-decoration: none;
            font-weight: 500;
            margin: 0 6px;
        }
        
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-tertiary);
            font-size: 1rem;
        }
        
        .loading::after {
            content: '';
            display: inline-block;
            width: 16px;
            height: 16px;
            margin-left: 8px;
            border: 2px solid var(--border-light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .points-week {
            font-weight: 500;
            color: var(--text-secondary);
        }
        
        .points-total {
            font-weight: 700;
            color: var(--primary-dark);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 РЕЙТИНГ</h1>
        <div class="subtitle">Королевская Битва • 4 мая — 24 мая 2026</div>
        
        <div class="tabs">
            <button class="tab active" data-tab="overall">🏔️ Общий</button>
            <button class="tab" data-tab="men">👨 Мужчины</button>
            <button class="tab" data-tab="women">👩 Женщины</button>
        </div>
        
        <div class="filters">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Поиск по имени...">
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalParticipants">0</div>
                <div class="stat-label">Участников</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalKm">0</div>
                <div class="stat-label">Всего км</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalWorkouts">0</div>
                <div class="stat-label">Тренировок</div>
            </div>
        </div>
        
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th data-sort="place">#</th>
                        <th data-sort="first_name">Участник</th>
                        <th data-sort="total_km">Км</th>
                        <th data-sort="total_workouts">Трен</th>
                        <th data-sort="avg_pace">Темп</th>
                        <th data-sort="snowflake_balance">🌼</th>
                        <th data-sort="week1_points">Н1</th>
                        <th data-sort="week2_points">Н2</th>
                        <th data-sort="week3_points">Н3</th>
                        <th data-sort="total_points">Очки</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="10" class="loading">Загрузка...</td></tr>
                </tbody>
            </table>
        </div>
        
        <div class="footer">
            <a href="index.html">← На главную</a> • 
            <a href="rules.html">📜 Правила</a> • 
            <a href="https://vk.me/club114046577">💬 Бот</a>
        </div>
    </div>
    
    <script>
        // Конфигурация Supabase
        const SUPABASE_URL = 'https://ohaspovkdvtihosvzpli.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9oYXNwb3ZrZHZ0aWhvc3Z6cGxpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NjI1ODEsImV4cCI6MjA5MDEzODU4MX0.5OvphjjVlBP8hXvLMIALsD6pZn5453mkSEpCeOl8280';
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let participants = [];
        let weeklyScores = [];
        let filteredParticipants = [];
        let sortColumn = 'total_km';
        let sortDirection = 'desc';
        let currentTab = 'overall';

        async function loadData() {
            try {
                const { data: participantsData, error: participantsError } = await supabaseClient
                    .from('participants')
                    .select('*')
                    .eq('status', 'active');
                
                if (participantsError) throw participantsError;
                participants = participantsData || [];
                
                const { data: scoresData, error: scoresError } = await supabaseClient
                    .from('weekly_scores')
                    .select('*');
                
                if (scoresError) throw scoresError;
                weeklyScores = scoresData || [];
                
                const { data: workoutsData } = await supabaseClient
                    .from('workouts')
                    .select('participant_id, original_km, original_min')
                    .eq('status', 'accepted');
                
                const workoutsByParticipant = {};
                workoutsData?.forEach(w => {
                    if (!workoutsByParticipant[w.participant_id]) {
                        workoutsByParticipant[w.participant_id] = { km: 0, min: 0 };
                    }
                    workoutsByParticipant[w.participant_id].km += w.original_km || 0;
                    workoutsByParticipant[w.participant_id].min += w.original_min || 0;
                });
                
                participants.forEach(p => {
                    const w = workoutsByParticipant[p.id] || { km: 0, min: 0 };
                    p.avg_pace = w.km > 0 ? w.min / w.km : 0;
                    
                    const scores = weeklyScores.filter(s => s.participant_id === p.id);
                    p.week1_points = scores.find(s => s.week_number === 1)?.total_points || 0;
                    p.week2_points = scores.find(s => s.week_number === 2)?.total_points || 0;
                    p.week3_points = scores.find(s => s.week_number === 3)?.total_points || 0;
                    p.total_points = p.week1_points + p.week2_points + p.week3_points;
                });
                
                applyFilters();
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                document.getElementById('tableBody').innerHTML = 
                    '<tr><td colspan="10" style="text-align: center; padding: 40px;">Ошибка загрузки данных</td></tr>';
            }
        }

        function applyFilters() {
            const searchInput = document.getElementById('searchInput');
            const searchTerm = searchInput.value.toLowerCase();
            
            filteredParticipants = participants.filter(p => {
                if (currentTab === 'men' && p.gender !== 'М') return false;
                if (currentTab === 'women' && p.gender !== 'Ж') return false;
                return true;
            });
            
            if (searchTerm) {
                filteredParticipants = filteredParticipants.filter(p => 
                    p.first_name.toLowerCase().includes(searchTerm) || 
                    p.last_name.toLowerCase().includes(searchTerm)
                );
            }
            
            updateStats();
            sortAndRender();
        }

        function updateStats() {
            const total = filteredParticipants.length;
            const totalKm = filteredParticipants.reduce((sum, p) => sum + (p.total_km || 0), 0);
            const totalWorkouts = filteredParticipants.reduce((sum, p) => sum + (p.total_workouts || 0), 0);
            
            document.getElementById('totalParticipants').textContent = total;
            document.getElementById('totalKm').textContent = Math.round(totalKm);
            document.getElementById('totalWorkouts').textContent = totalWorkouts;
        }

        function sortAndRender() {
            filteredParticipants.sort((a, b) => {
                let aVal = a[sortColumn];
                let bVal = b[sortColumn];
                
                if (['total_km', 'total_workouts', 'avg_pace', 'snowflake_balance', 'total_points', 'week1_points', 'week2_points', 'week3_points'].includes(sortColumn)) {
                    aVal = parseFloat(aVal) || 0;
                    bVal = parseFloat(bVal) || 0;
                } else if (sortColumn === 'place') {
                    return 0;
                } else {
                    aVal = String(aVal || '').toLowerCase();
                    bVal = String(bVal || '').toLowerCase();
                }
                
                if (sortDirection === 'asc') {
                    return aVal > bVal ? 1 : aVal < bVal ? -1 : 0;
                } else {
                    return aVal < bVal ? 1 : aVal > bVal ? -1 : 0;
                }
            });
            
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            
            if (filteredParticipants.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" style="text-align: center; padding: 40px;">Участники не найдены</td></tr>';
                return;
            }
            
            tbody.innerHTML = filteredParticipants.map((p, index) => {
                const place = index + 1;
                const pace = p.avg_pace > 0 ? p.avg_pace.toFixed(2) : '—';
                
                return `
                    <tr>
                        <td style="font-weight: 600;">${place}</td>
                        <td>${p.first_name} ${p.last_name}</td>
                        <td>${p.total_km || 0}</td>
                        <td>${p.total_workouts || 0}</td>
                        <td>${pace}</td>
                        <td>${p.snowflake_balance || 0}</td>
                        <td class="points-week">${p.week1_points || 0}</td>
                        <td class="points-week">${p.week2_points || 0}</td>
                        <td class="points-week">${p.week3_points || 0}</td>
                        <td class="points-total">${p.total_points || 0}</td>
                    </tr>
                `;
            }).join('');
            
            document.querySelectorAll('th[data-sort]').forEach(th => {
                const field = th.dataset.sort;
                th.classList.remove('sort-asc', 'sort-desc');
                if (field === sortColumn) {
                    th.classList.add(sortDirection === 'asc' ? 'sort-asc' : 'sort-desc');
                }
            });
        }

        document.querySelectorAll('th[data-sort]').forEach(th => {
            th.addEventListener('click', () => {
                const field = th.dataset.sort;
                if (field === 'place') {
                    sortColumn = 'total_km';
                } else {
                    sortColumn = field;
                }
                
                if (sortColumn === field && sortColumn !== 'place') {
                    sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
                } else {
                    sortDirection = field === 'first_name' ? 'asc' : 'desc';
                }
                
                sortAndRender();
            });
        });

        document.getElementById('searchInput').addEventListener('input', applyFilters);
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentTab = tab.dataset.tab;
                applyFilters();
            });
        });
        
        loadData();
        setInterval(loadData, 60000);
    </script>
</body>
</html>
